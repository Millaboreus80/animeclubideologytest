<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>动漫社意识形态测试</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root {
            --bg-color: #fdfdfd;
            --container-bg: #ffffff;
            --text-main: #333;
            --gray-light: #eee;
            --gray-dark: #666;
        }

        body { font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; background: var(--bg-color); color: var(--text-main); margin: 0; padding: 20px; }
        .container { max-width: 700px; margin: 40px auto; background: var(--container-bg); padding: 40px; border-radius: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.08); text-align: center; }
        
        /* 按钮设计 */
        .btn { display: block; width: 100%; margin: 12px 0; padding: 18px; font-size: 18px; border: none; border-radius: 12px; cursor: pointer; transition: 0.3s; font-weight: bold; }
        .btn-agree-max { background: #2e7d32; color: white; }
        .btn-agree { background: #66bb6a; color: white; }
        .btn-neutral { background: #bdbdbd; color: white; }
        .btn-disagree { background: #ef5350; color: white; }
        .btn-disagree-max { background: #c62828; color: white; }
        .btn:hover { transform: translateY(-2px); filter: brightness(1.1); }

        /* 结果页面样式 */
        .type-card { background: #333; color: white; padding: 30px; border-radius: 18px; margin-bottom: 40px; text-align: left; border-bottom: 5px solid #ffeb3b; }
        .bar-row { margin-bottom: 35px; padding: 20px; background: #f9f9f9; border-radius: 15px; border: 1px solid #eee; }
        .axis-label-mini { font-size: 12px; color: var(--gray-dark); margin-bottom: 6px; display: block; text-align: left; font-weight: bold; }

        /* 中轴线进度条核心 CSS */
        .center-bar-container { display: flex; width: 100%; height: 22px; background: #e0e0e0; position: relative; border-radius: 11px; overflow: hidden; }
        .center-line { position: absolute; left: 50%; top: 0; width: 2px; height: 100%; background: #333; z-index: 5; transform: translateX(-50%); }
        .side { flex: 1; display: flex; position: relative; }
        .left-side { justify-content: flex-end; }
        .right-side { justify-content: flex-start; }
        .fill { height: 100%; transition: width 0.8s cubic-bezier(0.16, 1, 0.3, 1); }

        .location-box { margin-top: 15px; padding: 12px; border-left: 5px solid #333; text-align: left; background: #fff; border-radius: 0 8px 8px 0; }
        .location-title { font-weight: bold; font-size: 16px; margin-bottom: 4px; }
        .location-desc { font-size: 13px; color: var(--gray-dark); line-height: 1.5; }

        #quiz-section, #result-section, #home-section { display: none; }
        #loading { font-size: 20px; color: #999; margin-top: 100px; }
    </style>
</head>
<body>

<div class="container">
    <div id="loading">少女祈祷中...</div>

    <div id="home-section">
        <h1 style="font-size: 32px; margin-bottom: 10px;">动漫社意识形态测试</h1>
        <p style="color: #666; margin-bottom: 40px;">用50道选择题，探索你的动漫社人格。</p>
        <p style="color: #ff0000; margin-bottom: 40px;">本测试充满了刻板印象和奇谈怪论以及可能的攻击性，结果不具任何可靠性。<br>该测试经过了原作者不知晓的他人修改。</p>
        <button class="btn btn-agree-max" style="width:240px; margin: 0 auto;" onclick="startQuiz()">你已接受这是纯娱乐测试</button>
    </div>

    <div id="quiz-section">
        <p id="progress-text" style="color: #999; font-size: 14px;"></p>
        <h2 id="question-text" style="min-height: 100px; margin: 40px 0; line-height: 1.4;">数据读取中...</h2>
        <button class="btn btn-agree-max" onclick="nextQuestion(1.0)">非常同意</button>
        <button class="btn btn-agree" onclick="nextQuestion(0.5)">同意</button>
        <button class="btn btn-neutral" onclick="nextQuestion(0)">中立/不确定</button>
        <button class="btn btn-disagree" onclick="nextQuestion(-0.5)">反对</button>
        <button class="btn btn-disagree-max" onclick="nextQuestion(-1.0)">非常反对</button>
    </div>

    <div id="result-section">
        <h1 style="margin-bottom: 30px;">分析</h1>
        <div id="axis-results"></div>
        <button class="btn btn-neutral" style="width:200px; margin: 40px auto;" onclick="location.reload()">重新测试</button>
    </div>
</div>

<script>
    let questions = [], locations = [], types = [];
    let currentIndex = 0;
    let scores = [0, 0, 0, 0, 0, 0, 0, 0];
    let maxScores = [0, 0, 0, 0, 0, 0, 0, 0];

    const axisNames = [
        { left: "秩序", right: "自由", colorL: "#1b5e20", colorR: "#b71c1c" },
        { left: "商业", right: "同人", colorL: "#0d47a1", colorR: "#e65100" },
        { left: "扩张", right: "保守", colorL: "#4a148c", colorR: "#fbc02d" },
        { left: "精英", right: "民粹", colorL: "#006064", colorR: "#ad1457" }
    ];

    // 初始化：链式异步加载 CSV
    window.onload = function() {
        Papa.parse("data.csv", {
            download: true,
            complete: function(qRes) {
                questions = qRes.data.slice(1);
                // 预计算最大分值
                questions.forEach(row => {
                    for (let i = 0; i < 8; i++) {
                        let w = parseFloat(row[i + 1]) || 0;
                        if (w > 0) maxScores[i] += w;
                    }
                });

                Papa.parse("location.csv", {
                    download: true,
                    complete: function(lRes) {
                        locations = lRes.data.slice(1);
                        Papa.parse("type.csv", {
                            download: true,
                            complete: function(tRes) {
                                types = tRes.data.slice(1);
                                document.getElementById('loading').style.display = 'none';
                                document.getElementById('home-section').style.display = 'block';
                            }
                        });
                    }
                });
            }
        });
    };

    function startQuiz() {
        document.getElementById('home-section').style.display = 'none';
        document.getElementById('quiz-section').style.display = 'block';
        showQuestion();
    }

    function showQuestion() {
        if (currentIndex < questions.length) {
            document.getElementById('progress-text').innerText = `QUESTION ${currentIndex + 1} / ${questions.length}`;
            document.getElementById('question-text').innerText = questions[currentIndex][0];
        } else {
            showResult();
        }
    }

    function nextQuestion(m) {
        const row = questions[currentIndex];
        for (let i = 0; i < 8; i++) {
            scores[i] += (parseFloat(row[i + 1]) || 0) * m;
        }
        currentIndex++;
        showQuestion();
    }

    // 根据综合分数匹配立场描述
    function getLoc(axisIdx, netScore) {
        let offset = 0;
        if (netScore > 0.33) offset = 0; // 极左
        else if (netScore > 0) offset = 1; // 温左
        else if (netScore > -0.33) offset = 2; // 温右
        else offset = 3; // 极右
        return locations[axisIdx * 4 + offset] || ["未知", "暂无描述"];
    }

    function showResult() {
        document.getElementById('quiz-section').style.display = 'none';
        document.getElementById('result-section').style.display = 'block';
        const resDiv = document.getElementById('axis-results');
        
        // 1. 计算人格画像索引 (二进制权重)
        let typeIndex = 0;
        let netScores = [];
        for (let i = 0; i < 4; i++) {
            let s1 = scores[i*2], m1 = maxScores[i*2];
            let s2 = scores[i*2+1], m2 = maxScores[i*2+1];
            let ns = (m1 + m2) > 0 ? (s1 - s2) / (m1 + m2) : 0;
            netScores.push(ns);
            if (ns <= 0) typeIndex += Math.pow(2, 3 - i); // 偏右则增加权重
        }

        const myType = types[typeIndex] || ["神秘观察者", "你的倾向非常独特，难以被常规定义。", "缺席"];
        
        // 2. 渲染人格卡片
        let html = `
            <div class="type-card">
                <div style="font-size: 14px; text-transform: uppercase; letter-spacing: 2px; color: #aaa;">测试结果类型</div>
                <h2 style="color: #ffeb3b; font-size: 28px; margin: 10px 0;">${myType[0]}</h2>
                <p style="font-size: 15px; opacity: 0.9; line-height: 1.6;">${myType[1]}</p>
                <div style="margin-top: 20px; font-weight: bold;">代表人物：<span style="color: #03a9f4;">${myType[2]}</span></div>
            </div>
            <h3 style="text-align: left; margin: 40px 0 20px 0;">详细维度统计</h3>
        `;

        // 3. 渲染各个维度
        for (let i = 0; i < 4; i++) {
            const axis = axisNames[i];
            const ns = netScores[i];
            const pct1 = maxScores[i*2] > 0 ? scores[i*2] / maxScores[i*2] : 0;
            const pct2 = maxScores[i*2+1] > 0 ? scores[i*2+1] / maxScores[i*2+1] : 0;
            const [locTitle, locDesc] = getLoc(i, ns);

            html += `
                <div class="bar-row">
                    <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                        <span style="font-weight:bold; color:${axis.colorL}">${axis.left}</span>
                        <span style="font-size: 12px; color: #999;">维度：${i+1}</span>
                        <span style="font-weight:bold; color:${axis.colorR}">${axis.right}</span>
                    </div>

                    <span class="axis-label-mini">综合净倾向 (权重差值)</span>
                    ${renderBar(ns, axis.colorL, axis.colorR)}

                    <span class="axis-label-mini">${axis.left} 认同度 (绝对得分比)</span>
                    ${renderBar(pct1, axis.colorL, axis.colorL)}

                    <span class="axis-label-mini">${axis.right} 认同度 (绝对得分比)</span>
                    ${renderBar(-pct2, axis.colorR, axis.colorR)}

                    <div class="location-box" style="border-color: ${ns >= 0 ? axis.colorL : axis.colorR}">
                        <div class="location-title" style="color:${ns >= 0 ? axis.colorL : axis.colorR}">${locTitle}</div>
                        <div class="location-desc">${locDesc}</div>
                    </div>
                </div>
            `;
        }
        resDiv.innerHTML = html;
    }

    function renderBar(val, cL, cR) {
        val = Math.max(-1, Math.min(1, val));
        let lW = val > 0 ? (val * 100).toFixed(1) : 0;
        let rW = val < 0 ? (Math.abs(val) * 100).toFixed(1) : 0;
        let color = val > 0 ? cL : cR;
        return `
            <div class="center-bar-container">
                <div class="center-line"></div>
                <div class="side left-side"><div class="fill" style="width:${lW}%; background:${color}"></div></div>
                <div class="side right-side"><div class="fill" style="width:${rW}%; background:${color}"></div></div>
            </div>
            <div style="height:10px;"></div>
        `;
    }
</script>
</body>
</html>
